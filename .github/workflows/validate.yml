name: Validation CI

on: pull_request

permissions:
  contents: read
  actions: read

concurrency:
  group: validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
      - name: Match local font fallback
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          mkdir -p ~/.config/fontconfig
          printf '%s\n' \
            '<?xml version="1.0"?>' \
            '<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">' \
            '<fontconfig>' \
            '<alias><family>Inter</family><prefer><family>Noto Sans CJK KR</family></prefer></alias>' \
            '<alias><family>Pretendard</family><prefer><family>Noto Sans CJK KR</family></prefer></alias>' \
            '<alias><family>Apple SD Gothic Neo</family><prefer><family>Noto Sans CJK KR</family></prefer></alias>' \
            '<alias><family>Malgun Gothic</family><prefer><family>Noto Sans CJK KR</family></prefer></alias>' \
            '<alias><family>system-ui</family><prefer><family>Noto Sans CJK KR</family></prefer></alias>' \
            '<alias><family>sans-serif</family><prefer><family>Noto Sans CJK KR</family></prefer></alias>' \
            '</fontconfig>' \
            > ~/.config/fontconfig/fonts.conf
          fc-cache -f
          fc-match Inter
      - run: deno run -A npm:playwright@1.60.0 install --with-deps chromium
      - uses: ./.github/actions/guide-data
        with:
          github-token: ${{ github.token }}
          cache-branch: ${{ github.event.repository.default_branch }}
      - run: deno task validate
      - uses: actions/upload-artifact@v4
        with:
          name: guide-data
          path: |
            src/data/guide.json
            src/data/overwatch.json
          if-no-files-found: error
          retention-days: 30
